            }
        };

        const colors = { shen: "#FFD700", qi: "#6BB3D9", qin: "#D4693C", li: "#7CB87C", xia: "#FF6B6B" };
        const names = { shen: '沈星回', qi: '祁煜', qin: '秦彻', li: '黎深', xia: '夏以昼' };

        let currentQuestion = 0;
        let scores = { shen: 0, qi: 0, qin: 0, li: 0, xia: 0 };

        function renderQuestion() {
            const container = document.getElementById('quiz-container');
            const q = questions[currentQuestion];
            
            document.getElementById('progress').style.width = ((currentQuestion) / questions.length) * 100 + '%';
            
            let optionsHTML = q.options.map((opt, idx) => 
                `<div class="option" onclick="selectOption(${idx})">${opt.text}</div>`
            ).join('');
            
            container.innerHTML = `
                <div class="question-card">
                    <div class="question-section">${q.section}</div>
                    <div class="question-number">问题 ${currentQuestion + 1} / ${questions.length}</div>
                    <div class="question-text">${q.text}</div>
                    ${q.hint ? `<div class="question-hint">${q.hint}</div>` : ''}
                    <div class="options">${optionsHTML}</div>
                </div>
            `;
        }

        function selectOption(idx) {
            const option = questions[currentQuestion].options[idx];
            for (let key in option.scores) {
                scores[key] = (scores[key] || 0) + option.scores[key];
            }
            currentQuestion++;
            if (currentQuestion < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            let maxScore = 0, winner = 'shen';
            for (let key in scores) {
                if (scores[key] > maxScore) { maxScore = scores[key]; winner = key; }
            }
            
            const result = results[winner];
            
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-card').style.display = 'block';
            document.getElementById('progress').style.width = '100%';
            
            document.getElementById('result-emoji').textContent = result.emoji;
            document.getElementById('result-name').textContent = result.name;
            document.getElementById('result-title').textContent = result.title;
            document.getElementById('user-profile').innerHTML = result.profile;
            document.getElementById('match-reason').innerHTML = result.matchReason;
            
            let barsHTML = '';
            const sortedScores = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            for (let [key, score] of sortedScores) {
                const percent = Math.round((score / maxScore) * 100);
                barsHTML += `
                    <div class="match-bar-item">
                        <div class="match-label"><span>${names[key]}</span><span>${percent}%</span></div>
                        <div class="match-bar">
                            <div class="match-fill" style="width: ${percent}%; background: ${colors[key]}"></div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('match-bars').innerHTML = barsHTML;
        }

        function restart() {
            currentQuestion = 0;
            scores = { shen: 0, qi: 0, qin: 0, li: 0, xia: 0 };
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('result-card').style.display = 'none';
            renderQuestion();
        }

        renderQuestion();
    </script>
</body>
</html>
